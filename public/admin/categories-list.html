<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>分類目錄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ops.css">
</head>
<body>
<nav class="nav">
  <span class="nav-brand">經辦</span>
  <a href="/apply">特殊申請</a>
  <a href="/admin/review">審核</a>
  <a href="/admin/categories/list">分類目錄</a>
  <a href="/admin/categories/edit">分類編輯</a>
  <a href="/admin/analytics">統計</a>
  <div class="nav-right"><button class="nav-logout" onclick="opsLogout()">登出</button></div>
</nav>

<div class="main">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
    <div><div class="page-title">分類目錄</div><div class="page-subtitle">各品牌可用的特殊申請分類（啟用中）</div></div>
    <a href="/admin/categories/edit" class="btn btn-primary btn-sm">前往編輯</a>
  </div>
  <div id="listArea"><div class="empty">載入中...</div></div>
</div>

<script src="/ops.js"></script>
<script>
  const BRANDS_ORDER = ['xuemi','sixdigital','kkschool','nschool','xlab'];

  window.addEventListener('DOMContentLoaded', async () => {
    initOpsPage('/admin/categories/list');
    try {
      const r = await opsGet('/api/categories/list');
      const cats = r.data || [];
      if (cats.length === 0) { document.getElementById('listArea').innerHTML = '<div class="empty">尚無分類，請先前往分類編輯新增</div>'; return; }

      let html = '';
      BRANDS_ORDER.forEach(bk => {
        const bCats = cats.filter(c => c.brandKey === bk);
        if (!bCats.length) return;
        html += `<div class="section-heading">${BRAND_DISPLAY[bk]}</div>
        <div class="card" style="padding:0;overflow:hidden;margin-bottom:20px">
          <div class="table-wrap"><table>
            <thead><tr><th>項目名稱</th><th>扣%類型</th><th>扣%值</th><th>寄信模板</th></tr></thead>
            <tbody>
              ${bCats.map(c => `<tr>
                <td>${c.itemName}</td>
                <td>${c.deductType}</td>
                <td>${c.deductType==='固定'?(c.deductValue??0)+'%':c.deductType==='不扣'?'0%':'—'}</td>
                <td>${c.emailTemplate ? '<span style="color:var(--accent)">✓ 有模板</span>' : '<span style="color:var(--text-muted)">—</span>'}</td>
              </tr>`).join('')}
            </tbody>
          </table></div>
        </div>`;
      });
      document.getElementById('listArea').innerHTML = html;
    } catch { document.getElementById('listArea').innerHTML = '<div class="empty">載入失敗</div>'; }
  });
</script>
</body>
</html>
